replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

mongodb:
  image: mongo:6
  port: 27017

frontend:
  image:
    repository: streaming-frontend
    tag: latest
  service:
    port: 80

