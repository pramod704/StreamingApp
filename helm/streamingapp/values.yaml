    repository: streaming-streaming
    tag: latest
  service:
    port: 3002

admin:
  image:
    repository: streaming-admin
    tag: latest
  service:
    port: 3003

chat:
  image:
    repository: streaming-chat
    tag: latest
  service:
    port: 3004
